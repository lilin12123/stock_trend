app:
  tz: "Asia/Hong_Kong"
  auth:
    bootstrap_admin:
      username: "admin"
      password: "CHANGE_ME"
    public_registration:
      enabled: true
      max_users: 200
  open_d:
    host: "127.0.0.1"
    port: 11111
  timeframes: ["1m", "5m"]
  symbols:
    - "HK.00981"
    - "HK.01810"
    - "HK.09988"
    - "HK.00700"
    - "US.NVDA"
    - "US.AMZN"
    - "US.TSLA"
  symbol_names:
    "HK.00981": "SMIC"
    "HK.01810": "Xiaomi"
    "HK.09988": "Alibaba"
    "HK.00700": "Tencent"
    "US.NVDA": "NVIDIA"
    "US.AMZN": "Amazon"
    "US.TSLA": "Tesla"
  notify:
    mode: "telegram"
    telegram:
      token: "${TELEGRAM_BOT_TOKEN}"
      chat_id: "${TELEGRAM_CHAT_ID}"
  web:
    enabled: true
    host: "127.0.0.1"
    port: 8088
    max_signals: 200
  storage:
    dir: "/opt/stock_trend/data/signals"
    load_days: 7
    db_path: "/opt/stock_trend/data/app.sqlite"
  warmup:
    enabled: true

rules:
  cooldown_seconds: 60

  open_range_breakout:
    enabled: true
    range_minutes: 15
    volume_mult: 1.5
    tf_overrides:
      "1m":
        volume_mult: 1.2

  vwap_deviation:
    enabled: true
    atr_period: 14
    dev_atr_mult: 1.5
    volume_mult: 2.0
    vol_avg_period: 20
    tf_overrides:
      "1m":
        dev_atr_mult: 1.2
        volume_mult: 1.5
        vol_avg_period: 12

  squeeze_breakout:
    enabled: true
    atr_period: 14
    lookback: 60
    low_quantile: 0.2
    volume_mult: 1.5
    tf_overrides:
      "1m":
        lookback: 40
        volume_mult: 1.2

  rsi_extreme:
    enabled: true
    period: 14
    overbought: 70
    oversold: 30

  break_retest:
    enabled: true
    retest_max_bars: 20
    retest_tolerance_pct: 0.1

  volume_price_divergence:
    enabled: true
    lookback: 20
    volume_mult: 0.8

  prev_day_break:
    enabled: true
    volume_mult: 1.5

backtest:
  tf_1m_horizon_minutes: 15
  tf_1m_min_move_pct: 0.5
  tf_5m_horizon_minutes: 60
  tf_5m_min_move_pct: 1.5
